<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1280" />
  <title>OVAL CLM™ — Continuous Metabolic Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Locked palette */
      --ink: #0A1F17;
      --ink-2: #34453E;
      --ink-3: #6B7B73;
      --line: rgba(10, 31, 23, 0.08);
      --line-2: rgba(10, 31, 23, 0.14);
      --bg: #FFFFFF;
      --bg-soft: #FAFAF7;
      --bg-cream: #F4F1E7;
      --green: #2DDF94;       /* OVAL brand */
      --green-deep: #185038;  /* OVAL secondary */
      --green-fog: #E8FBF1;
      --green-mist: #F1FBF5;
      --green-glow: #1BB271;

      /* CLM theme — lactate blue */
      --clm-bg: #060A12;
      --clm-bg-2: #0B1220;
      --clm-blue: #4FD8FF;
      --clm-blue-deep: #0E3A52;
      --clm-line: rgba(255,255,255,0.1);
      --clm-ink-2: rgba(255,255,255,0.68);
      --clm-ink-3: rgba(255,255,255,0.42);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-feature-settings: 'ss01', 'ss02', 'cv11';
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; }

    /* ── primitive button ─────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 20px; border-radius: 999px;
      font-size: 15px; font-weight: 500; letter-spacing: -0.01em;
      border: 1px solid transparent; transition: all .2s ease;
      white-space: nowrap;
    }
    .btn-primary { background: var(--ink); color: white; }
    .btn-primary:hover { background: var(--green-deep); }
    .btn-green { background: var(--green); color: var(--green-deep); font-weight: 600; }
    .btn-green:hover { background: var(--green-glow); color: white; }
    .btn-ghost { color: var(--ink); border-color: var(--line-2); background: transparent; }
    .btn-ghost:hover { background: var(--ink); color: white; border-color: var(--ink); }
    .btn-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 15px; font-weight: 500; color: var(--green-deep);
    }
    .btn-link:hover { gap: 10px; }

    /* CLM theme button + link variants (for dark hero) */
    .btn-clm { background: var(--clm-blue); color: #03222F; font-weight: 600; }
    .btn-clm:hover { background: #8FE9FF; }
    .btn-link-clm {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 15px; font-weight: 500; color: var(--clm-blue);
    }
    .btn-link-clm:hover { gap: 10px; }

    /* ── section frame ───────────────────────────── */
    .container { max-width: 1280px; margin: 0 auto; padding: 0 64px; }
    section { position: relative; }

    /* ── eyebrow / kicker ─────────────────────────── */
    .eyebrow {
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 12px; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--green-deep);
      display: inline-flex; align-items: center; gap: 10px;
    }
    .eyebrow::before {
      content: ""; width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 0 4px rgba(45,223,148,.18);
    }
    .eyebrow-clm {
      color: var(--clm-blue);
    }
    .eyebrow-clm::before {
      background: var(--clm-blue); box-shadow: 0 0 0 4px rgba(79,216,255,.18);
    }

    /* ── headlines ───────────────────────────────── */
    .h-display {
      font-size: 72px; line-height: 0.96; letter-spacing: -0.035em;
      font-weight: 500; color: var(--ink);
      text-wrap: balance;
    }
    .h-1 {
      font-size: 56px; line-height: 1.02; letter-spacing: -0.03em;
      font-weight: 500; color: var(--ink);
      text-wrap: balance;
    }
    .h-2 {
      font-size: 40px; line-height: 1.06; letter-spacing: -0.025em;
      font-weight: 500; color: var(--ink);
      text-wrap: balance;
    }
    .lede {
      font-size: 19px; line-height: 1.55; color: var(--ink-2);
      max-width: 56ch; text-wrap: pretty;
    }
    .body-md { font-size: 16px; line-height: 1.55; color: var(--ink-2); }
    .body-sm { font-size: 14px; line-height: 1.5; color: var(--ink-3); }
    .label-mono {
      font-family: 'Geist Mono', monospace;
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--ink-3);
    }
    .serif { font-family: inherit; font-style: normal; font-weight: inherit; }

    /* utility */
    .grow { flex: 1; }
    .row { display: flex; }
    .col { display: flex; flex-direction: column; }
    .center { align-items: center; justify-content: center; }
    .between { justify-content: space-between; }

    /* ── animations ──────────────────────────────── */
    @keyframes drift {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }
    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .5; transform: scale(1.4); }
    }
    @keyframes gentle-rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .reveal { animation: gentle-rise .9s cubic-bezier(.2,.7,.2,1) both; }

    /* CLM hero device glow */
    @keyframes clm-glow-pulse {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50% { opacity: 0.9; transform: scale(1.04); }
    }
    @keyframes clm-rotate-slow {
      to { transform: rotate(360deg); }
    }
    @keyframes clm-dash {
      to { stroke-dashoffset: -240; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/nav.jsx"></script>
  <script type="text/babel" src="src/hero.jsx"></script>
  <script type="text/babel" src="src/wearables.jsx"></script>
  <script type="text/babel" src="src/metabolic-flow.jsx"></script>
  <script type="text/babel" src="src/audiences.jsx"></script>
  <script type="text/babel" src="src/footer.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
