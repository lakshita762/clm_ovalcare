<!doctype html>
<html lang="en">
<head>
  <script>
    (function () {
      var saved = localStorage.getItem("clm-theme");
      document.documentElement.setAttribute("data-theme", saved === "light" ? "light" : "dark");
    })();
  </script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OVAL CLM™ — Continuous Metabolic Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Locked palette */
      --ink: #0A1F17;
      --ink-2: #34453E;
      --ink-3: #6B7B73;
      --line: rgba(10, 31, 23, 0.08);
      --line-2: rgba(10, 31, 23, 0.14);
      --bg: #FFFFFF;
      --bg-soft: #FAFAF7;
      --bg-cream: #F4F1E7;
      --green: #2DDF94;       /* OVAL brand */
      --green-deep: #185038;  /* OVAL secondary */
      --green-fog: #E8FBF1;
      --green-mist: #F1FBF5;
      --green-glow: #1BB271;

      /* CLM theme — lactate blue (dark, default) */
      --clm-bg: #060A12;
      --clm-bg-2: #0B1220;
      --clm-blue: #4FD8FF;
      --clm-blue-deep: #0E3A52;
      --clm-line: rgba(255,255,255,0.1);
      --clm-ink: #FFFFFF;
      --clm-ink-2: rgba(255,255,255,0.68);
      --clm-ink-3: rgba(255,255,255,0.42);
      --clm-nav-bg: rgba(6,10,18,0.55);
      --clm-pill-1: #173852;
      --clm-pill-2: #030710;
      --clm-pill-ink: #FFFFFF;
      --clm-pill-ink-soft: rgba(255,255,255,0.55);
      --clm-sheen: rgba(255,255,255,0.18);
    }

    /* CLM theme — light variant, toggled via data-theme on <html> */
    html[data-theme="light"] {
      --clm-bg: #FFFFFF;
      --clm-bg-2: #F2F7FA;
      --clm-blue: #0B84A6;
      --clm-blue-deep: #CFEFFA;
      --clm-line: rgba(10,31,23,0.1);
      --clm-ink: #0A1F17;
      --clm-ink-2: rgba(10,31,23,0.68);
      --clm-ink-3: rgba(10,31,23,0.42);
      --clm-nav-bg: rgba(255,255,255,0.72);
      --clm-pill-1: #EAF6FD;
      --clm-pill-2: #FFFFFF;
      --clm-pill-ink: #0A1F17;
      --clm-pill-ink-soft: rgba(10,31,23,0.55);
      --clm-sheen: rgba(10,31,23,0.08);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-feature-settings: 'ss01', 'ss02', 'cv11';
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
      transition: background-color .25s ease;
    }

    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; }

    .oval-logo { filter: none; transition: filter .2s ease; }
    html[data-theme="light"] .oval-logo { filter: invert(1); }

    /* ── primitive button ─────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 20px; border-radius: 999px;
      font-size: 15px; font-weight: 500; letter-spacing: -0.01em;
      border: 1px solid transparent; transition: all .2s ease;
      white-space: nowrap;
    }
    .btn-primary { background: var(--ink); color: white; }
    .btn-primary:hover { background: var(--green-deep); }
    .btn-green { background: var(--green); color: var(--green-deep); font-weight: 600; }
    .btn-green:hover { background: var(--green-glow); color: white; }
    .btn-ghost { color: var(--ink); border-color: var(--line-2); background: transparent; }
    .btn-ghost:hover { background: var(--ink); color: white; border-color: var(--ink); }
    .btn-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 15px; font-weight: 500; color: var(--green-deep);
    }
    .btn-link:hover { gap: 10px; }

    /* CLM theme button + link variants (for dark hero) */
    .btn-clm { background: var(--clm-blue); color: #03222F; font-weight: 600; }
    .btn-clm:hover { background: #8FE9FF; }
    .btn-link-clm {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 15px; font-weight: 500; color: var(--clm-blue);
    }
    .btn-link-clm:hover { gap: 10px; }

    /* ── section frame ───────────────────────────── */
    .container { max-width: 1280px; margin: 0 auto; padding: 0 64px; }
    section { position: relative; }

    /* ── responsive layout blocks (desktop defaults) ───── */
    .hero-inner {
      display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 48px;
      align-items: center; align-content: center; min-height: calc(100vh - 72px);
      padding-top: 56px; padding-bottom: 56px;
    }
    .clm-device { position: relative; width: 100%; max-width: 520px; aspect-ratio: 520 / 600; margin: 0 auto; }
    .wearables-head { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: end; margin-bottom: 56px; }
    .wearables-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .flow-head { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: end; margin-bottom: 48px; }
    .flow-panel { padding: 44px 48px; }
    .flow-diagram { display: flex; align-items: flex-start; }
    .audiences-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
    .footer-grid { display: grid; grid-template-columns: repeat(3, 1fr) 1.4fr; gap: 48px; margin-bottom: 64px; justify-items: center; }
    .footer-bottom { display: flex; align-items: center; justify-content: space-between; gap: 24px; }

    /* ── responsive breakpoints ──────────────────────── */
    @media (max-width: 900px) {
      .container { padding: 0 28px; }

      .h-display { font-size: 44px; }
      .h-1 { font-size: 34px; }
      .h-2 { font-size: 28px; }
      .lede { font-size: 17px; }

      .hero-inner {
        grid-template-columns: 1fr; min-height: auto;
        padding-top: 36px; padding-bottom: 48px; gap: 40px;
      }
      .clm-device { max-width: 320px; }

      .wearables-head, .flow-head { grid-template-columns: 1fr; gap: 24px; align-items: start; }
      .wearables-grid { grid-template-columns: 1fr; gap: 16px; }
      .flow-panel { padding: 28px 20px; overflow-x: auto; }
      .flow-diagram { width: max-content; min-width: 100%; }
      .audiences-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
      .footer-grid { grid-template-columns: 1fr 1fr; gap: 36px; justify-items: start; text-align: left; }
      .footer-bottom { flex-direction: column; align-items: flex-start; gap: 16px; }
    }

    @media (max-width: 560px) {
      .container { padding: 0 20px; }
      .h-display { font-size: 36px; }
      .h-1 { font-size: 28px; }
      .h-2 { font-size: 24px; }

      .audiences-grid { grid-template-columns: 1fr; }
      .footer-grid { grid-template-columns: 1fr; gap: 32px; }
      .footer-bottom { font-size: 12px; }
    }

    /* ── eyebrow / kicker ─────────────────────────── */
    .eyebrow {
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 12px; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--green-deep);
      display: inline-flex; align-items: center; gap: 10px;
    }
    .eyebrow::before {
      content: ""; width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 0 4px rgba(45,223,148,.18);
    }
    .eyebrow-clm {
      color: var(--clm-blue);
    }
    .eyebrow-clm::before {
      background: var(--clm-blue); box-shadow: 0 0 0 4px rgba(79,216,255,.18);
    }

    /* ── headlines ───────────────────────────────── */
    .h-display {
      font-size: 72px; line-height: 0.96; letter-spacing: -0.035em;
      font-weight: 500; color: var(--ink);
      text-wrap: balance;
    }
    .h-1 {
      font-size: 56px; line-height: 1.02; letter-spacing: -0.03em;
      font-weight: 500; color: var(--ink);
      text-wrap: balance;
    }
    .h-2 {
      font-size: 40px; line-height: 1.06; letter-spacing: -0.025em;
      font-weight: 500; color: var(--ink);
      text-wrap: balance;
    }
    .lede {
      font-size: 19px; line-height: 1.55; color: var(--ink-2);
      max-width: 56ch; text-wrap: pretty;
    }
    .body-md { font-size: 16px; line-height: 1.55; color: var(--ink-2); }
    .body-sm { font-size: 14px; line-height: 1.5; color: var(--ink-3); }
    .label-mono {
      font-family: 'Geist Mono', monospace;
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--ink-3);
    }
    .serif { font-family: inherit; font-style: normal; font-weight: inherit; }

    /* utility */
    .grow { flex: 1; }
    .row { display: flex; }
    .col { display: flex; flex-direction: column; }
    .center { align-items: center; justify-content: center; }
    .between { justify-content: space-between; }

    /* ── animations ──────────────────────────────── */
    @keyframes drift {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }
    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .5; transform: scale(1.4); }
    }
    @keyframes gentle-rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .reveal { animation: gentle-rise .9s cubic-bezier(.2,.7,.2,1) both; }

    /* CLM hero device glow */
    @keyframes clm-glow-pulse {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50% { opacity: 0.9; transform: scale(1.04); }
    }
    @keyframes clm-rotate-slow {
      to { transform: rotate(360deg); }
    }
    @keyframes clm-dash {
      to { stroke-dashoffset: -240; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/nav.jsx"></script>
  <script type="text/babel" src="src/hero.jsx"></script>
  <script type="text/babel" src="src/wearables.jsx"></script>
  <script type="text/babel" src="src/metabolic-flow.jsx"></script>
  <script type="text/babel" src="src/audiences.jsx"></script>
  <script type="text/babel" src="src/footer.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
